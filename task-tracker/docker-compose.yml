services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=/app/data/tasks.db
    volumes:
      - ./backend/data:/app/data
    networks:
      - task-tracker-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    networks:
      - task-tracker-network

networks:
  task-tracker-network:
    driver: bridge
