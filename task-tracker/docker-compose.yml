version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=./data/tasks.db
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - db
    networks:
      - task-tracker-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:3001/api
    depends_on:
      - backend
    networks:
      - task-tracker-network

  db:
    image: sqlite3:latest
    volumes:
      - ./backend/data:/data
    command: ["sqlite3", "/data/tasks.db", ".read /data/init.sql"]
    networks:
      - task-tracker-network

networks:
  task-tracker-network:
    driver: bridge

volumes:
  db-data: