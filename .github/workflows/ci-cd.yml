name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Backend install
      - name: Install backend deps
        working-directory: task-tracker/backend
        run: npm install

      # Frontend install
      - name: Install frontend deps
        working-directory: task-tracker/frontend
        run: npm install

      # Optional: add tests later
      - name: Run backend tests
        working-directory: task-tracker/backend
        run: echo "No tests yet"

      - name: Run frontend build
        working-directory: task-tracker/frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        working-directory: task-tracker
        run: docker compose build